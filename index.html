<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Glass P2P</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#08080f;
      --surface:rgba(255,255,255,0.04);
      --surface2:rgba(255,255,255,0.07);
      --border:rgba(255,255,255,0.08);
      --accent:#8b5cf6;
      --accent2:#06b6d4;
      --text:#e2e8f0;
      --muted:#64748b;
      --green:#10b981;
      --red:#ef4444;
      --yellow:#f59e0b;
      --sent:rgba(139,92,246,0.18);
      --recv:rgba(255,255,255,0.06);
      --r:16px;
    }
    html,body{height:100%}
    body{
      font-family:'Vazirmatn','Segoe UI',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      overflow-x:hidden;
    }
    /* --- ambient glow --- */
    body::before,body::after{
      content:'';position:fixed;border-radius:50%;
      filter:blur(120px);pointer-events:none;z-index:0;
    }
    body::before{top:-25%;right:-15%;width:55vw;height:55vh;background:rgba(139,92,246,.12)}
    body::after{bottom:-25%;left:-15%;width:60vw;height:60vh;background:rgba(6,182,212,.08)}

    .app{
      position:relative;z-index:1;
      max-width:520px;margin:0 auto;
      padding:14px;
      display:flex;flex-direction:column;gap:10px;
      min-height:100vh;min-height:100dvh;
    }

    /* --- glass --- */
    .g{
      background:var(--surface);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);
      border-radius:var(--r);padding:14px;
    }

    /* --- header --- */
    .hdr{text-align:center;padding:18px 14px}
    .hdr h1{
      font-size:1.45rem;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .hdr p{font-size:.8rem;color:var(--muted);margin-top:3px}

    /* --- status badge --- */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;
    }
    .b-off{background:rgba(100,116,139,.18);color:var(--muted)}
    .b-wait{background:rgba(245,158,11,.15);color:var(--yellow)}
    .b-on{background:rgba(16,185,129,.18);color:var(--green)}

    /* --- inputs --- */
    input[type=text]{
      width:100%;padding:11px 14px;
      background:rgba(0,0,0,.35);border:1px solid var(--border);
      border-radius:12px;color:var(--text);font-size:1.05rem;
      font-family:inherit;outline:none;
      direction:ltr;text-align:center;letter-spacing:5px;
      transition:border-color .2s,box-shadow .2s;
    }
    input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
    input[type=text]:disabled{opacity:.5}

    textarea{
      flex:1;padding:10px 14px;
      background:rgba(0,0,0,.35);border:1px solid var(--border);
      border-radius:12px;color:var(--text);font-size:.9rem;
      font-family:inherit;outline:none;resize:none;
      min-height:42px;max-height:110px;
      transition:border-color .2s;
    }
    textarea:focus{border-color:var(--accent)}

    /* --- buttons --- */
    .btn{
      border:none;border-radius:12px;font-weight:600;
      font-size:.9rem;font-family:inherit;cursor:pointer;
      padding:11px 18px;transition:all .18s;white-space:nowrap;
    }
    .btn-p{
      background:linear-gradient(135deg,var(--accent),#6d28d9);
      color:#fff;box-shadow:0 4px 14px rgba(139,92,246,.3);
    }
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.45)}
    .btn-p:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
    .btn-d{
      background:linear-gradient(135deg,var(--red),#b91c1c);color:#fff;
      box-shadow:0 4px 14px rgba(239,68,68,.25);
    }
    .btn-d:hover{transform:translateY(-1px)}
    .ib{
      width:42px;height:42px;flex-shrink:0;
      border:none;background:var(--surface2);
      border-radius:12px;color:var(--text);
      font-size:1.15rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .ib:hover{background:rgba(255,255,255,.12)}
    .ib:disabled{opacity:.4;cursor:default}

    /* --- messages --- */
    .msgs{
      flex:1;overflow-y:auto;
      display:flex;flex-direction:column;gap:7px;
      padding:6px 4px;
      min-height:280px;max-height:52vh;
      scroll-behavior:smooth;
    }
    .bub{
      max-width:82%;padding:10px 14px;
      border-radius:16px;font-size:.88rem;line-height:1.65;
      word-wrap:break-word;animation:pop .18s ease;
    }
    @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .b-sent{align-self:flex-end;background:var(--sent);border-bottom-left-radius:8px}
    .b-recv{align-self:flex-start;background:var(--recv);border-bottom-right-radius:8px}
    .b-sys{align-self:center;background:0 0;color:var(--muted);font-size:.76rem;font-style:italic}
    .b-stk{background:0 0;font-size:2.8rem;padding:2px 4px}
    .bub img,.bub video{max-width:100%;border-radius:10px;margin-top:6px;display:block}
    .bub audio{width:100%;margin-top:6px;max-width:280px}
    .dlink{color:var(--accent2);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-weight:500}

    /* --- input area --- */
    .inp-row{display:flex;gap:7px;align-items:flex-end}

    /* --- stickers --- */
    .stk-p{
      display:none;flex-wrap:wrap;gap:4px;
      padding:8px 0;max-height:130px;overflow-y:auto;
    }
    .stk-p.open{display:flex}
    .stk{
      font-size:1.7rem;padding:5px 6px;
      border:none;background:rgba(255,255,255,.04);
      border-radius:10px;cursor:pointer;
      transition:transform .12s,background .12s;
    }
    .stk:hover{transform:scale(1.18);background:rgba(255,255,255,.1)}

    /* --- progress --- */
    progress{
      width:100%;height:6px;border-radius:3px;
      appearance:none;-webkit-appearance:none;
      background:rgba(255,255,255,.08);overflow:hidden;
    }
    progress::-webkit-progress-bar{background:rgba(255,255,255,.08);border-radius:3px}
    progress::-webkit-progress-value{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:3px;transition:width .15s;
    }
    progress::-moz-progress-bar{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:3px;
    }

    /* --- scrollbar --- */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:0 0}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

    /* --- err --- */
    .err{color:var(--red);font-size:.78rem;margin-top:7px;display:none}
    .err.show{display:block}

    /* --- responsive --- */
    @media(max-width:480px){
      .app{padding:8px;gap:8px}
      .g{padding:11px}
      .msgs{min-height:220px;max-height:46vh}
      .bub{max-width:88%;font-size:.84rem}
      .hdr h1{font-size:1.25rem}
    }
    @media(min-height:800px){
      .msgs{min-height:360px}
    }
  </style>
</head>
<body>

<div class="app">

  <div class="g hdr">
    <h1>Glass P2P</h1>
    <p>گفتگوی امن و مستقیم — بدون سرور</p>
  </div>

  <!-- connection -->
  <div class="g">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-weight:600;font-size:.92rem">اتصال</span>
      <span class="badge b-off" id="st">Offline</span>
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" id="ci" placeholder="کد اتاق" maxlength="20" autocomplete="off">
      <button class="btn btn-p" id="cb">اتصال</button>
      <button class="btn btn-d" id="db" style="display:none">قطع</button>
    </div>
    <div class="err" id="er"></div>
  </div>

  <!-- chat -->
  <div class="g" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div style="font-weight:600;font-size:.92rem;margin-bottom:6px">پیام‌ها</div>
    <div class="msgs" id="mb"></div>
    <div style="margin-top:6px">
      <div class="inp-row">
        <textarea id="mi" placeholder="پیام..." rows="1"></textarea>
        <input type="file" id="fi" accept="image/*,audio/*,video/*,.pdf,.zip,.rar,.doc,.docx,.txt" style="display:none">
        <button class="ib" id="ab" title="فایل">📎</button>
        <button class="ib" id="sb" title="استیکر">😊</button>
        <button class="btn btn-p" id="se" style="padding:10px 15px">ارسال</button>
      </div>
      <div class="stk-p" id="sp"></div>
      <div id="fp" style="display:none;margin-top:6px">
        <progress id="pg" value="0" max="100"></progress>
        <small id="pt" style="color:var(--muted);font-size:.72rem"></small>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/trystero@0.20.0/dist/trystero.min.js"></script>
<script>
(function(){
'use strict';

/* ===== DOM ===== */
const $ = id => document.getElementById(id);
const ci=$('ci'),cb=$('cb'),db=$('db'),st=$('st'),er=$('er');
const mb=$('mb'),mi=$('mi'),se=$('se'),fi=$('fi'),ab=$('ab');
const sb=$('sb'),sp=$('sp'),fp=$('fp'),pg=$('pg'),pt=$('pt');

/* ===== state ===== */
let room=null, connected=false, peers=0, timer=null;
let fState=null;        // file receive buffer
let sending=false;      // file send lock

/* ===== stickers ===== */
const emojis='😀😂🤣😍🥰😘😜🤩🤑🤗😎🤔😴🥳😇🤠😤😭😱🤦‍♂️❤️🧡💛💚💙💜🤎🖤💔💕💖🔥⭐✨🎉🎊💪👍👎👏🤝🎵🎶☕🍕🍿🎮📱💡🔑🏆🎯'.split(/(?=.)/u).filter(e=>e.length>0);

// build sticker list (use a reliable split)
const stickerList=['😀','😂','🤣','😍','🥰','😘','😜','🤩','🤑','🤗','😎','🤔','😴','🥳','😇','🤠','😤','😭','😱','🤦','❤️','🧡','💛','💚','💙','💜','🤎','🖤','💔','💕','💖','🔥','⭐','✨','🎉','🎊','💪','👍','👎','👏','🤝','🎵','🎶','☕','🍕'];

stickerList.forEach(e=>{
  const b=document.createElement('button');
  b.className='stk';b.textContent=e;
  b.onclick=()=>{sendStk(e);sp.classList.remove('open')};
  sp.appendChild(b);
});
sb.onclick=()=>sp.classList.toggle('open');

/* ===== helpers ===== */
function setSt(txt,cls){st.textContent=txt;st.className='badge '+cls}
function showErr(t){er.textContent=t;er.classList.add('show');setTimeout(()=>er.classList.remove('show'),6000)}
function fmtSz(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(1)+' MB';
}

function addBub(cls,txt,html){
  const d=document.createElement('div');
  d.className='bub '+cls;
  if(cls==='b-stk'){d.textContent=txt}
  else if(html){d.innerHTML=txt+html}
  else{d.textContent=txt}
  mb.appendChild(d);mb.scrollTop=mb.scrollHeight;
}

function addFile(cls,name,blob){
  const u=URL.createObjectURL(blob);
  const ext=name.split('.').pop().toLowerCase();
  const img=['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext);
  const vid=['mp4','webm','mov','avi','mkv'].includes(ext);
  const aud=['mp3','wav','ogg','aac','flac','m4a'].includes(ext);
  const d=document.createElement('div');
  d.className='bub '+cls;
  let h='📁 '+name+'<br>';
  if(img)h+=`<img src="${u}" alt="${name}" style="max-width:260px">`;
  else if(vid)h+=`<video src="${u}" controls style="max-width:260px"></video>`;
  else if(aud)h+=`<audio src="${u}" controls></audio>`;
  else h+=`<a href="${u}" download="${name}" class="dlink">📥 دانلود</a>`;
  d.innerHTML=h;mb.appendChild(d);mb.scrollTop=mb.scrollHeight;
}

function prog(show,txt){
  fp.style.display=show?'block':'none';
  if(txt)pt.textContent=txt;
  if(!show){pg.value=0;pt.textContent=''}
}

/* ===== base64 helpers ===== */
function ab2b64(buf){
  const bytes=new Uint8Array(buf);
  const ch=8192;let s='';
  for(let i=0;i<bytes.length;i+=ch){
    s+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));
  }
  return btoa(s);
}
function b642ab(b64){
  const bin=atob(b64);
  const a=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);
  return a;
}

/* ===== connect ===== */
function connect(code){
  if(room){try{room.leave()}catch(e){}room=null}
  clearTimeout(timer);er.classList.remove('show');

  try{
    if(typeof trystero==='undefined') throw new Error('کتابخانه بارگذاری نشد');
    const jn=trystero.torrent||trystero.joinRoom||trystero;
    if(typeof jn!=='function') throw new Error('تابع اتصال یافت نشد');
    room=jn({appId:'glass-p2p-v4'},code);
  }catch(e){
    showErr('خطا: '+e.message);return;
  }

  /* actions */
  let sTxt,gTxt,sStk,gStk,sFm,gFm,sFc,gFc;
  try{
    [sTxt,gTxt]=room.makeAction('t');
    [sStk,gStk]=room.makeAction('s');
    [sFm,gFm]=room.makeAction('fm');
    [sFc,gFc]=room.makeAction('fc');
  }catch(e){
    showErr('خطای کانال: '+e.message);
    try{room.leave()}catch(e2){}
    room=null;return;
  }

  /* store senders */
  room._sTxt=sTxt;room._sStk=sStk;room._sFm=sFm;room._sFc=sFc;

  /* peers */
  room.onPeerJoin(()=>{
    peers++;connected=true;
    setSt(peers+' همتا','b-on');
    addBub('b-sys','🔗 همتا متصل شد');
    clearTimeout(timer);
  });
  room.onPeerLeave(()=>{
    peers=Math.max(0,peers-1);
    if(peers===0){connected=false;setSt('در انتظار…','b-wait');addBub('b-sys','❌ همتا قطع شد')}
    else{setSt(peers+' همتا','b-on');addBub('b-sys','👋 یک همتا خارج شد')}
  });

  /* receive text */
  gTxt((d)=>{
    if(typeof d==='string') addBub('b-recv',d);
  });

  /* receive sticker */
  gStk((d)=>{
    if(typeof d==='string') addBub('b-stk',d);
  });

  /* receive file meta */
  gFm((m)=>{
    fState={name:m.n,size:m.sz,type:m.t,ch:m.c,buf:[],got:0};
    prog(true,'دریافت: '+m.n+' ('+fmtSz(m.sz)+')');
    addBub('b-sys','📥 دریافت "'+m.n+'" شروع شد');
  });

  /* receive file chunk */
  gFc((d)=>{
    if(!fState)return;
    try{
      const arr=b642ab(d.d);
      fState.buf[d.i]=arr;
      fState.got++;
      const pct=Math.round(fState.got/fState.ch*100);
      pg.value=pct;
      pt.textContent=fState.got+'/'+fState.ch+' ('+pct+'%)';
      if(fState.got===fState.ch){
        const blob=new Blob(fState.buf,{type:fState.t});
        addFile('b-recv',fState.name,blob);
        prog(false);
        addBub('b-sys','✅ "'+fState.name+'" دریافت شد');
        fState=null;
      }
    }catch(e){console.error('chunk err',e)}
  });

  /* UI */
  setSt('در انتظار…','b-wait');
  cb.style.display='none';db.style.display='inline-flex';
  ci.disabled=true;
  addBub('b-sys','⏳ وارد اتاق "'+code+'" شدید — منتظر همتا…');

  timer=setTimeout(()=>{
    if(!connected) addBub('b-sys','⏳ هنوز همتایی نیست. مطمئن شوید طرف مقابل هم همین کد را زده.');
  },15000);
}

function disconnect(){
  if(room){try{room.leave()}catch(e){}room=null}
  clearTimeout(timer);
  connected=false;peers=0;sending=false;fState=null;
  setSt('Offline','b-off');
  cb.style.display='inline-flex';db.style.display='none';
  ci.disabled=false;prog(false);
  addBub('b-sys','🚪 اتاق را ترک کردید');
}

/* ===== event: connect/disconnect ===== */
cb.onclick=()=>{
  const c=ci.value.trim();
  if(!c){showErr('کد اتاق را وارد کنید');return}
  connect(c);
};
ci.onkeydown=e=>{if(e.key==='Enter')cb.click()};
db.onclick=disconnect;

/* ===== send text ===== */
function doSend(){
  const t=mi.value.trim();
  if(!t||!room||!connected)return;
  room._sTxt(t);
  addBub('b-sent',t);
  mi.value='';mi.style.height='auto';
}
se.onclick=doSend;
mi.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}};
mi.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'};

/* ===== send sticker ===== */
function sendStk(e){
  if(!room||!connected)return;
  room._sStk(e);
  addBub('b-stk',e);
}

/* ===== file send ===== */
ab.onclick=()=>fi.click();
fi.onchange=()=>{
  const f=fi.files[0];
  if(!f)return;
  if(!room||!connected){alert('ابتدا متصل شوید');fi.value='';return}
  if(sending){alert('در حال ارسال فایل قبلی');fi.value='';return}
  doSendFile(f);
  fi.value='';
};

async function doSendFile(file){
  const CHUNK=16*1024;
  const total=Math.ceil(file.size/CHUNK);
  if(total>8000){alert('فایل بسیار بزرگ است');return}

  sending=true;
  room._sFm({n:file.name,sz:file.size,t:file.type||'application/octet-stream',c:total});
  addBub('b-sys','📤 ارسال "'+file.name+'" ('+fmtSz(file.size)+')');
  prog(true,'ارسال: '+file.name);

  try{
    for(let i=0;i<total;i++){
      if(!connected){addBub('b-sys','❌ ارسال لغو شد');break}
      const start=i*CHUNK;
      const end=Math.min(start+CHUNK,file.size);
      const buf=await file.slice(start,end).arrayBuffer();
      room._sFc({i,d:ab2b64(buf)});
      const pct=Math.round((i+1)/total*100);
      pg.value=pct;
      pt.textContent=(i+1)+'/'+total+' ('+pct+'%)';
      if(i%12===11) await new Promise(r=>setTimeout(r,30));
    }
    if(connected) addBub('b-sys','✅ "'+file.name+'" ارسال شد');
  }catch(e){
    addBub('b-sys','❌ خطا: '+e.message);
  }
  prog(false);sending=false;
}

/* ===== cleanup ===== */
window.addEventListener('beforeunload',()=>{if(room)try{room.leave()}catch(e){}});

})();
</script>
</body>
</html>
