<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Glass P2P - Room</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(145deg, #0b0c1a 0%, #1a1c3b 50%, #0f1123 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: 1px solid rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      --accent: #8b5cf6;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --bubble-sent: rgba(139, 92, 246, 0.25);
      --bubble-received: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.3);
      --radius: 18px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
      padding: 16px; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -30%; left: -20%; width: 80%; height: 80%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
      filter: blur(100px); z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -30%; right: -20%; width: 90%; height: 90%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1), transparent 70%);
      filter: blur(120px); z-index: 0;
    }
    .container {
      width: 100%; max-width: 520px; position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 16px; padding-bottom: 24px;
    }
    .glass-card {
      background: var(--glass-bg); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border: var(--glass-border);
      border-radius: var(--radius); box-shadow: var(--glass-shadow); padding: 18px;
    }
    h2 {
      font-size: 1.5rem; font-weight: 600;
      background: linear-gradient(to left, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; text-align: center; margin-bottom: 6px;
    }
    .btn {
      border: none; background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: white; padding: 10px 16px; border-radius: 14px; font-weight: 600;
      cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;
      transition: 0.2s; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6); }
    .btn-outline {
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      box-shadow: none; color: #e2e8f0;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      box-shadow: 0 4px 15px rgba(239,68,68,0.3);
    }
    .icon-btn {
      background: rgba(255,255,255,0.1); border: none; color: white;
      width: 42px; height: 42px; border-radius: 12px; font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 0.9rem; font-weight: 600;
    }
    .connected { background: rgba(16,185,129,0.25); color: #10b981; }
    .disconnected { background: rgba(248,113,113,0.2); color: #f87171; }
    input, textarea {
      width: 100%; padding: 12px 14px; background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      color: #f1f5f9; font-size: 0.95rem; outline: none;
      backdrop-filter: blur(10px);
    }
    input:focus, textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
    }
    textarea { resize: none; min-height: 44px; }
    .messages-box {
      height: 320px; overflow-y: auto; display: flex; flex-direction: column;
      gap: 8px; padding: 8px 4px;
    }
    .chat-bubble {
      max-width: 85%; padding: 10px 14px; border-radius: 18px;
      word-wrap: break-word; font-size: 0.9rem; line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .sent { align-self: flex-end; background: var(--bubble-sent); border-bottom-left-radius: 12px; }
    .received { align-self: flex-start; background: var(--bubble-received); border-bottom-right-radius: 12px; }
    .system { align-self: center; background: transparent; color: #94a3b8; font-size:0.8rem; font-style:italic; }
    .sticker-bubble { font-size: 3rem; background: transparent; padding: 4px; }
    .file-attachment img, .file-attachment video, .file-attachment audio {
      max-width: 100%; border-radius: 12px; margin-top: 6px; display: block;
    }
    progress {
      width: 100%; height: 8px; border-radius: 10px; overflow: hidden;
      appearance: none; background: rgba(255,255,255,0.1); margin-top: 8px;
    }
    progress::-webkit-progress-bar { background: rgba(255,255,255,0.1); border-radius:10px; }
    progress::-webkit-progress-value { background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:10px; }
    progress::-moz-progress-bar { background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:10px; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .sticker-panel {
      display: none; flex-wrap: wrap; gap: 6px; padding: 10px 0;
      max-height: 160px; overflow-y: auto; justify-content: center;
    }
    .sticker-panel.open { display: flex; }
    .sticker-btn {
      background: rgba(255,255,255,0.08); border: none; font-size: 2rem;
      padding: 6px; border-radius: 14px; cursor: pointer;
    }
    .sticker-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
    .error-message {
      color: #f87171; font-size: 0.8rem; margin-top: 6px; display: none;
    }
    .error-message.show { display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card" style="text-align:center;">
    <h2>✨ Glass P2P Room</h2>
  </div>

  <!-- اتصال با کد مشترک -->
  <div class="glass-card">
    <div style="font-weight:600; margin-bottom:8px;">🔐 کد اتصال</div>
    <div class="input-row">
      <input type="text" id="roomCode" placeholder=" " autocomplete="off" style="flex:2;">
      <button class="btn" id="connectBtn" style="flex:1;">اتصال</button>
      <button class="btn btn-danger" id="disconnectBtn" style="display:none;">قطع</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
      <span id="connStatus" class="status-badge disconnected">عدم اتصال</span>
      <span id="errorMsg" class="error-message"></span>
    </div>
  </div>

  <!-- پیام‌ها -->
  <div class="glass-card">
    <div style="font-weight:600; margin-bottom:8px;">💬 پیام‌ها</div>
    <div class="messages-box" id="messagesContainer"></div>
    <div style="margin-top:8px;">
      <div class="input-row">
        <textarea id="msgInput" placeholder="پیام..." rows="1"></textarea>
        <button class="icon-btn" id="attachBtn" title="ارسال فایل">＋</button>
        <button class="icon-btn" id="stickerToggleBtn" title="استیکر">😀</button>
        <button class="btn" id="sendMsgBtn">ارسال</button>
      </div>
      <div id="stickerPanel" class="sticker-panel"></div>
      <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
      <small id="fileStatus" style="color:var(--text-secondary);"></small>
    </div>
  </div>
</div>
<input type="file" id="hiddenFileInput" accept="image/*,audio/*,video/*" style="display:none;">

<script src="https://unpkg.com/trystero@0.20.0/dist/trystero.min.js"></script>
<script>
  (function() {
    // DOM refs
    const roomCodeInput = document.getElementById('roomCode');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const connStatus = document.getElementById('connStatus');
    const errorMsg = document.getElementById('errorMsg');
    const msgInput = document.getElementById('msgInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const attachBtn = document.getElementById('attachBtn');
    const hiddenFileInput = document.getElementById('hiddenFileInput');
    const stickerToggleBtn = document.getElementById('stickerToggleBtn');
    const stickerPanel = document.getElementById('stickerPanel');
    const progressBar = document.getElementById('progressBar');
    const fileStatus = document.getElementById('fileStatus');

    // State
    let room = null;
    let connected = false;
    let connectTimeout = null;
    let receivingMeta = null;
    let receivingBuffer = [];
    let receivedChunks = 0;

    // Stickers
    const stickers = ["😀","😂","🤣","😍","🥰","😘","😜","🤩","🤑","🤗","😎","🤔","😴","🥳","😇","🤠","❤️","🧡","💛","💚","💙","💜","🤎","🖤","🤍","💘","💝","💖","💗","🔥","⭐","✨","🎉","🎊","🎈","🌟","💥","🍕","🎵","🎶"];
    function buildStickers() {
      stickerPanel.innerHTML = '';
      stickers.forEach(e => {
        const b = document.createElement('button');
        b.className = 'sticker-btn';
        b.textContent = e;
        b.onclick = () => { sendSticker(e); stickerPanel.classList.remove('open'); };
        stickerPanel.appendChild(b);
      });
    }
    buildStickers();
    stickerToggleBtn.onclick = () => stickerPanel.classList.toggle('open');

    // Helper functions
    function setConnected(state) {
      connected = state;
      if (state) {
        connStatus.textContent = 'متصل';
        connStatus.className = 'status-badge connected';
        disconnectBtn.style.display = 'inline-flex';
        connectBtn.style.display = 'none';
        roomCodeInput.disabled = true;
        errorMsg.classList.remove('show');
      } else {
        connStatus.textContent = 'عدم اتصال';
        connStatus.className = 'status-badge disconnected';
        disconnectBtn.style.display = 'none';
        connectBtn.style.display = 'inline-flex';
        roomCodeInput.disabled = false;
      }
    }

    function showError(text) {
      errorMsg.textContent = text;
      errorMsg.classList.add('show');
      setConnected(false);
      if (room) {
        room.leave();
        room = null;
      }
    }

    function addChatBubble(type, content, extraHtml = '') {
      const div = document.createElement('div');
      div.className = `chat-bubble ${type}`;
      if (type === 'sticker') {
        div.classList.add('sticker-bubble');
        div.textContent = content;
      } else if (extraHtml) {
        div.innerHTML = content + extraHtml;
      } else {
        div.textContent = content;
      }
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addFileMessage(type, fileName, url, isImg, isVid, isAud) {
      const div = document.createElement('div');
      div.className = `chat-bubble ${type} file-attachment`;
      let inner = `📁 ${fileName}<br>`;
      if (isImg) inner += `<img src="${url}" alt="${fileName}">`;
      else if (isVid) inner += `<video src="${url}" controls></video>`;
      else if (isAud) inner += `<audio src="${url}" controls></audio>`;
      else inner += `<a href="${url}" download="${fileName}" style="color:#06b6d4;">📥 دانلود</a>`;
      div.innerHTML = inner;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showProgress(show) {
      progressBar.style.display = show ? 'block' : 'none';
      if (!show) progressBar.value = 0;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/(1024*1024)).toFixed(1) + ' MB';
    }

    // Connection management
    function joinRoom(code) {
      if (room) {
        room.leave();
        room = null;
      }
      clearTimeout(connectTimeout);
      errorMsg.classList.remove('show');
      setConnected(false);

      try {
        room = trystero.joinRoom({ appId: 'glass-p2p-room-1' }, code);
      } catch (e) {
        showError('خطا در ایجاد اتاق: ' + e.message);
        return;
      }

      // Peer join handler
      room.onPeerJoin((peerId) => {
        setConnected(true);
        addChatBubble('system', 'همتا متصل شد');
        clearTimeout(connectTimeout);
      });

      room.onPeerLeave((peerId) => {
        // Check if any peers left (the room may still have others)
        // Since we only need one connection, if leave and no one else, set disconnected
        room.getPeers().then(peers => {
          if (peers.length === 0) {
            setConnected(false);
            addChatBubble('system', 'همتا قطع شد');
          }
        });
      });

      // Message handler
      room.onMessage((data, peerId) => {
        if (typeof data === 'string') {
          try {
            const obj = JSON.parse(data);
            if (obj.type === 'sticker') {
              addChatBubble('received', obj.emoji);
              return;
            } else if (obj.type === 'file-start') {
              receivingMeta = obj;
              receivingBuffer = new Array(obj.totalChunks);
              receivedChunks = 0;
              showProgress(true);
              progressBar.value = 0;
              fileStatus.textContent = `دریافت فایل: ${obj.name} (${formatSize(obj.size)})`;
              addChatBubble('system', `دریافت فایل ${obj.name} شروع شد`);
              return;
            }
          } catch (e) {}
          addChatBubble('received', data);
        } else if (data instanceof ArrayBuffer) {
          if (!receivingMeta) return;
          if (data.byteLength < 4) return;
          const view = new DataView(data);
          const chunkIndex = view.getUint32(0, false);
          const chunk = new Uint8Array(data.slice(4));
          if (chunkIndex < receivingBuffer.length) {
            receivingBuffer[chunkIndex] = chunk;
            receivedChunks++;
            progressBar.value = (receivedChunks / receivingMeta.totalChunks) * 100;
            fileStatus.textContent = `دریافت: ${receivedChunks}/${receivingMeta.totalChunks}`;
            if (receivedChunks === receivingMeta.totalChunks) {
              const blob = new Blob(receivingBuffer);
              const url = URL.createObjectURL(blob);
              const ext = receivingMeta.name.split('.').pop().toLowerCase();
              const isImg = ['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext);
              const isVid = ['mp4','webm','mov','avi','mkv'].includes(ext);
              const isAud = ['mp3','wav','ogg','aac','flac','m4a'].includes(ext);
              addFileMessage('received', receivingMeta.name, url, isImg, isVid, isAud);
              receivingMeta = null;
              receivingBuffer = [];
              showProgress(false);
              fileStatus.textContent = '';
            }
          }
        }
      });

      // Timeout: if no peer after 20s, show error
      connectTimeout = setTimeout(() => {
        room.getPeers().then(peers => {
          if (peers.length === 0) {
            showError('خطا در اتصال: همتایی پیدا نشد. کد را بررسی کنید یا شبکه را عوض کنید.');
            room.leave();
            room = null;
          }
        });
      }, 20000);
    }

    connectBtn.onclick = () => {
      const code = roomCodeInput.value.trim();
      if (!code) return;
      joinRoom(code);
    };

    disconnectBtn.onclick = () => {
      if (room) {
        room.leave();
        room = null;
      }
      clearTimeout(connectTimeout);
      setConnected(false);
      addChatBubble('system', 'شما اتاق را ترک کردید');
      receivingMeta = null;
      showProgress(false);
    };

    // Send text
    sendMsgBtn.onclick = () => {
      const msg = msgInput.value.trim();
      if (!msg || !room || !connected) return;
      room.send(msg);
      addChatBubble('sent', msg);
      msgInput.value = '';
      msgInput.style.height = 'auto';
    };
    msgInput.onkeypress = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsgBtn.click();
      }
    };
    msgInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // Sticker
    function sendSticker(emoji) {
      if (!room || !connected) return;
      room.send(JSON.stringify({ type: 'sticker', emoji }));
      addChatBubble('sent', emoji);
    }

    // File attach
    attachBtn.onclick = () => hiddenFileInput.click();
    hiddenFileInput.onchange = () => {
      const file = hiddenFileInput.files[0];
      if (!file) return;
      if (!room || !connected) {
        alert('ابتدا به یک همتا متصل شوید');
        hiddenFileInput.value = '';
        return;
      }
      sendFile(file);
      hiddenFileInput.value = '';
    };

    function sendFile(file) {
      const chunkSize = 14 * 1024;
      const totalChunks = Math.ceil(file.size / chunkSize);
      let currentChunk = 0;

      const meta = { type: 'file-start', name: file.name, size: file.size, totalChunks };
      room.send(JSON.stringify(meta));
      showProgress(true);
      progressBar.value = 0;
      fileStatus.textContent = `ارسال: 0/${totalChunks}`;
      addChatBubble('system', `ارسال فایل ${file.name} (${formatSize(file.size)})`);

      const reader = new FileReader();
      reader.onload = (e) => {
        const chunk = new Uint8Array(e.target.result);
        const header = new ArrayBuffer(4);
        new DataView(header).setUint32(0, currentChunk, false);
        const combined = new Uint8Array(4 + chunk.byteLength);
        combined.set(new Uint8Array(header), 0);
        combined.set(chunk, 4);
        room.send(combined.buffer);

        currentChunk++;
        progressBar.value = (currentChunk / totalChunks) * 100;
        fileStatus.textContent = `ارسال: ${currentChunk}/${totalChunks}`;
        if (currentChunk < totalChunks) {
          readNext();
        } else {
          addChatBubble('sent', `📁 ${file.name}`);
          showProgress(false);
          fileStatus.textContent = '';
        }
      };
      function readNext() {
        const start = currentChunk * chunkSize;
        const end = Math.min(start + chunkSize, file.size);
        reader.readAsArrayBuffer(file.slice(start, end));
      }
      readNext();
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (room) room.leave();
    });
  })();
</script>
</body>
</html>
